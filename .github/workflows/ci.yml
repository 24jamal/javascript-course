name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap package.json if missing
        run: if [ ! -f package.json ]; then npm init -y; fi

      - name: Install ESLint
        run: npm install --save-dev eslint

      - name: Create ESLint config if missing
        run: |
          if [ ! -f .eslintrc.json ]; then
            echo '{"env":{"browser":true,"es2021":true},"extends":"eslint:recommended","parserOptions":{"ecmaVersion":"latest","sourceType":"module"},"rules":{"no-unused-vars":"warn","no-undef":"warn"}}' > .eslintrc.json
          fi

      - name: Run ESLint
        run: npx eslint "**/*.js" --ignore-pattern "node_modules/**"
        continue-on-error: true

      - name: Install html-validate
        run: npm install --save-dev html-validate

      - name: Run HTML Validate
        run: npx html-validate "**/*.html" --ignore "node_modules/**"
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap package.json if missing
        run: if [ ! -f package.json ]; then npm init -y; fi

      - name: Install Jest
        run: npm install --save-dev jest jest-environment-jsdom

      - name: Run tests
        run: |
          if find . -name "*.test.js" -not -path "*/node_modules/*" | grep -q .; then
            npx jest --ci --coverage --coverageDirectory=coverage
          else
            echo "No test files found - skipping."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap package.json if missing
        run: if [ ! -f package.json ]; then npm init -y; fi

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4